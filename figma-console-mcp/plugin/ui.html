<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, -apple-system, sans-serif;
    font-size: 12px;
    background: #1E1E1E;
    color: #E5E5E5;
    padding: 12px;
    height: 180px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #9CA3AF;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #F59E0B;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  #status {
    font-size: 12px;
    font-weight: 500;
    padding: 6px 8px;
    background: #2A2A2A;
    border-radius: 6px;
    border: 1px solid #333;
    color: #F59E0B;
  }
  .port { color: #4B5563; font-size: 10px; }
  #log {
    flex: 1;
    background: #111;
    border-radius: 6px;
    border: 1px solid #2A2A2A;
    padding: 6px 8px;
    overflow-y: auto;
    font-family: 'Consolas', monospace;
    font-size: 10px;
    color: #6EE7B7;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .log-line.err { color: #FCA5A5; }
</style>
</head>
<body>
  <div class="header">
    <div class="dot" id="dot"></div>
    Claude Console Bridge
  </div>
  <div id="status">Connecting...</div>
  <div class="port">ws://localhost:9988</div>
  <div id="log"></div>

<script>
var WS_URL = 'ws://localhost:9988';
var RECONNECT_MS = 3000;
var ws = null;
var pendingCalls = {}; // id -> {resolve, reject}

var statusEl = document.getElementById('status');
var dotEl    = document.getElementById('dot');
var logEl    = document.getElementById('log');

function setStatus(text, color) {
  statusEl.textContent = text;
  statusEl.style.color = color;
  dotEl.style.background = color;
}

function addLog(text, isErr) {
  var line = document.createElement('div');
  line.className = 'log-line' + (isErr ? ' err' : '');
  line.textContent = text;
  logEl.appendChild(line);
  while (logEl.children.length > 30) logEl.removeChild(logEl.firstChild);
  logEl.scrollTop = logEl.scrollHeight;
}

// ── Nhận kết quả từ code.js (figma sandbox) ──────────────────
window.onmessage = function(event) {
  var msg = event.data.pluginMessage;
  if (!msg) return;

  if (msg.type === 'result') {
    var pending = pendingCalls[msg.id];
    if (!pending) return;
    delete pendingCalls[msg.id];
    if (msg.error) {
      addLog('✗ #' + msg.id + ': ' + msg.error, true);
      pending.reject(msg.error);
    } else {
      addLog('✓ exec #' + msg.id);
      pending.resolve(msg.result);
    }
  }
};

// ── WebSocket → MCP Server ────────────────────────────────────
function connect() {
  setStatus('Connecting...', '#F59E0B');
  ws = new WebSocket(WS_URL);

  ws.onopen = function() {
    setStatus('✅ Connected to Claude MCP', '#10B981');
    addLog('Connected ✓');
  };

  ws.onmessage = function(event) {
    var msg;
    try { msg = JSON.parse(event.data); } catch(e) { return; }

    if (msg.type === 'eval') {
      // Gửi sang code.js để thực thi trong figma sandbox
      var id = msg.id;
      var code = msg.payload.code;

      var p = new Promise(function(resolve, reject) {
        pendingCalls[id] = { resolve: resolve, reject: reject };
        // Timeout 25s
        setTimeout(function() {
          if (pendingCalls[id]) {
            delete pendingCalls[id];
            reject('Timeout — code.js không phản hồi');
          }
        }, 25000);
      });

      // Post sang plugin sandbox
      parent.postMessage({ pluginMessage: { type: 'eval', id: id, code: code } }, '*');

      p.then(function(result) {
        ws.send(JSON.stringify({ id: id, result: result }));
      }).catch(function(err) {
        ws.send(JSON.stringify({ id: id, error: String(err) }));
      });
    }
  };

  ws.onerror = function() {
    setStatus('❌ Error', '#EF4444');
  };

  ws.onclose = function() {
    setStatus('Reconnecting...', '#9CA3AF');
    setTimeout(connect, RECONNECT_MS);
  };
}

connect();
</script>
</body>
</html>
