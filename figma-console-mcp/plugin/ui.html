<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, -apple-system, sans-serif;
    font-size: 12px;
    background: #1E1E1E;
    color: #E5E5E5;
    padding: 12px;
    height: 160px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #9CA3AF;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #F59E0B;
    flex-shrink: 0;
  }
  #status {
    font-size: 12px;
    font-weight: 500;
    padding: 6px 8px;
    background: #2A2A2A;
    border-radius: 6px;
    border: 1px solid #333;
    color: #F59E0B;
  }
  #log {
    flex: 1;
    background: #111;
    border-radius: 6px;
    border: 1px solid #2A2A2A;
    padding: 6px 8px;
    overflow-y: auto;
    font-family: 'Consolas', monospace;
    font-size: 10px;
    color: #6EE7B7;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .log-line { opacity: 0.85; }
  .log-line.err { color: #FCA5A5; }
  .port { color: #6B7280; font-size: 10px; margin-top: 2px; }
</style>
</head>
<body>
  <div class="header">
    <div class="dot" id="dot"></div>
    Claude Console Bridge
  </div>
  <div id="status">Connecting...</div>
  <div class="port">ws://localhost:9988</div>
  <div id="log"></div>

  <script>
    const statusEl = document.getElementById('status');
    const dotEl = document.getElementById('dot');
    const logEl = document.getElementById('log');
    const MAX_LOGS = 20;

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'status') {
        statusEl.textContent = msg.text;
        statusEl.style.color = msg.color || '#E5E5E5';
        dotEl.style.background = msg.color || '#9CA3AF';
      }

      if (msg.type === 'log') {
        const line = document.createElement('div');
        line.className = 'log-line' + (msg.color === '#EF4444' ? ' err' : '');
        line.textContent = msg.text;
        logEl.appendChild(line);
        // Giữ tối đa MAX_LOGS dòng
        while (logEl.children.length > MAX_LOGS) {
          logEl.removeChild(logEl.firstChild);
        }
        logEl.scrollTop = logEl.scrollHeight;
      }
    };
  </script>
</body>
</html>
